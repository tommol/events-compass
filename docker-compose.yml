services:
  postgres:
    image: postgres:16-alpine
    container_name: events-compass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: events_compass
      POSTGRES_USER: events
      POSTGRES_PASSWORD: events
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U events -d events_compass']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
